<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铸信机械 - 产品配置报价单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.3.2/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.5.3/jspdf.min.js"></script>
    <script src="product_database.js"></script>
    <script src="image_matcher.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; -webkit-text-size-adjust: 100%; }
        /* IOS Safari 兼容性修复 */
        @supports (-webkit-touch-callout: none) {
            body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
        }
        .print-btn { background: linear-gradient(135deg, #dc2626 0%, #ea580c 100%); }
        .print-btn:hover { background: linear-gradient(135deg, #b91c1c 0%, #c2410c 100%); }
        @media print {
            .no-print { display: none !important; }
            .print-area { box-shadow: none !important; }
        }
        /* IOS Safari 触摸事件优化 */
        .optional-item-card {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        /* IOS 滚动优化 */
        body {
            -webkit-overflow-scrolling: touch;
        }
        /* IOS 按钮样式优化 */
        button, a {
            -webkit-appearance: none;
            appearance: none;
            border-radius: 0;
        }
        /* 可选配置图片预览样式 */
        .optional-item-card .optional-image-preview {
            display: none;
        }
        .optional-item-card:hover .optional-image-preview,
        .optional-item-card:active .optional-image-preview {
            display: block;
        }
        .optional-item-card {
            position: relative;
        }
        /* 防止预览框被截断 */
        #optionalConfigs {
            padding-bottom: 150px;
        }
        /* LOGO作为背景居中展示 */
        .print-area {
            position: relative;
            background-color: rgba(255, 255, 255, 0.95) !important;
        }
        .print-area::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 60%;
            background-image: url('./images/logo.png.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
            -webkit-transform: translate(-50%, -50%);
        }
        .print-area > * {
            position: relative;
            z-index: 1;
        }
        /* 产品图片展示样式 - 机械设备专属优化 */
        #productImageContainer {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12), inset 0 2px 0 rgba(255,255,255,0.8);
            border: 1px solid #e5e7eb;
            position: relative;
        }
        #productImageContainer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #dc2626, #ea580c, #f59e0b);
        }
        #productImage {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            padding: 16px;
            box-sizing: border-box;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), filter 0.4s ease;
        }
        #productImage:hover {
            transform: scale(1.03);
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15));
        }
        /* 可选配置图片对齐 - 完美填充 */
        .optional-image-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 110px;
            overflow: hidden;
            background-color: #ffffff;
            border-radius: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            position: relative;
        }
        .optional-image-container img {
            display: block !important;
            max-width: 100% !important;
            max-height: 100% !important;
            width: auto !important;
            height: auto !important;
            object-fit: contain !important;
            padding: 4px !important;
            box-sizing: border-box !important;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            transform: translateZ(0);
            transition: transform 0.3s ease !important;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        .optional-item-card:hover .optional-image-container img {
            transform: scale(1.05) translateZ(0) !important;
        }
        /* 可选配置图片预览样式 - 优化 */
        .optional-image-preview {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 8px;
            z-index: 1000;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 8px;
            border: 1px solid #e5e7eb;
            display: none;
            min-width: 200px;
        }
        .optional-image-preview img {
            width: 180px;
            height: 120px;
            object-fit: contain;
            border-radius: 4px;
            display: block;
        }
        .optional-image-preview p {
            margin: 6px 0 0 0;
            font-size: 12px;
            color: #6b7280;
            text-align: center;
        }
        /* 移动端触摸预览优化 */
        @media (max-width: 768px) {
            .optional-item-card {
                -webkit-tap-highlight-color: transparent;
            }
            .optional-item-card:active .optional-image-preview {
                display: block;
            }
            .optional-image-container {
                height: 90px;
            }
            .optional-image-preview {
                min-width: 160px;
            }
            .optional-image-preview img {
                width: 140px;
                height: 95px;
            }
        }
        /* 防止图片加载失败时显示占位符 */
        .optional-image-container img {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect fill="%23f3f4f6" width="100" height="100"/><text fill="%239ca3af" font-family="Arial" font-size="12" x="50" y="50" text-anchor="middle" dominant-baseline="middle">加载中...</text></svg>');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 50%;
        }
    </style>
</head>
<body class="bg-gray-100 py-8">
    <div class="container mx-auto px-4">
        <!-- 操作按钮 -->
        <div class="no-print mb-6 flex flex-wrap gap-4 justify-center">
            <button onclick="window.print()" class="print-btn text-white px-6 py-3 rounded-lg font-bold hover:shadow-xl transition">
                <i class="fas fa-print mr-2"></i>打印报价单
            </button>
            <button onclick="exportToExcel()" class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700 transition">
                <i class="fas fa-file-excel mr-2"></i>导出Excel
            </button>
            <button onclick="exportToImage()" class="bg-red-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-red-700 transition">
                <i class="fas fa-image mr-2"></i>保存图片
            </button>
            <button onclick="saveAsPDF()" class="bg-purple-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-purple-700 transition">
                <i class="fas fa-file-pdf mr-2"></i>保存为PDF
            </button>
            <a href="https://www.zhuxinmachine.com/" target="_blank" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                <i class="fas fa-arrow-left mr-2"></i>返回产品页
            </a>
        </div>

        <!-- 报价单内容 -->
        <div class="print-area bg-white rounded-xl shadow-2xl p-8 max-w-5xl mx-auto">
            <!-- 抬头 -->
            <div class="border-b-2 border-red-600 pb-6 mb-6">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
                    <div class="mb-4 md:mb-0">
                        <h1 class="text-3xl font-bold text-gray-800">浙江铸信机械有限公司</h1>
                        <p class="text-gray-500">ZHEJIANG ZHUXIN MACHINERY CO., LTD.</p>
                    </div>
                    <div class="text-right">
                        <h2 class="text-2xl font-bold text-red-600">产品配置报价单</h2>
                        <p class="text-gray-500">QUOTATION</p>
                        <div class="flex items-center justify-end mt-1">
                            <input type="date" id="quoteDateInput" class="text-sm border border-gray-300 rounded px-2 py-1 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none" onchange="updateQuoteDate()">
                            <span id="timeSyncStatus" class="ml-2 text-xs"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 客户信息 -->
            <div class="bg-gray-50 rounded-lg p-4 mb-6">
                <h3 class="font-bold text-gray-700 mb-3"><i class="fas fa-user-circle mr-2"></i>客户信息</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-sm text-gray-500">客户名称：</label>
                        <input type="text" id="customerName" placeholder="请输入客户名称" class="w-full border-b border-gray-300 focus:border-red-500 outline-none bg-transparent">
                    </div>
                    <div>
                        <label class="text-sm text-gray-500">联系电话：</label>
                        <input type="text" id="customerPhone" placeholder="请输入联系电话" class="w-full border-b border-gray-300 focus:border-red-500 outline-none bg-transparent">
                    </div>
                    <div>
                        <label class="text-sm text-gray-500">报价日期：</label>
                        <span id="quoteDateDisplay" class="font-medium"></span>
                    </div>
                </div>
            </div>

            <!-- 产品选择 -->
            <div class="mb-6">
                <h3 class="font-bold text-gray-700 mb-3"><i class="fas fa-cubes mr-2"></i>产品配置</h3>
                
                <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
                    <div class="lg:col-span-3">
                        <!-- 产品系列选择 -->
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-600 mb-2">选择产品系列：</label>
                            <select id="productSeries" onchange="updateModels()" class="w-full md:w-64 px-4 py-2 border border-gray-300 rounded-lg focus:border-red-500 focus:ring-1 focus:ring-red-500">
                                <option value="">请选择产品系列</option>
                                <option value="filmBlowing">吹膜机系列</option>
                                <option value="bagMaker">制袋机系列</option>
                                <option value="printer">印刷机系列</option>
                            </select>
                        </div>

                        <!-- 具体型号选择 -->
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-600 mb-2">选择具体型号：</label>
                            <select id="productModel" onchange="updateProductConfig()" class="w-full md:w-64 px-4 py-2 border border-gray-300 rounded-lg focus:border-red-500 focus:ring-1 focus:ring-red-500">
                                <option value="">请先选择产品系列</option>
                            </select>
                        </div>

                        <!-- 数量选择 -->
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-600 mb-2">数量：</label>
                            <input type="number" id="quantity" value="1" min="1" onchange="calculateTotal()" class="w-32 px-4 py-2 border border-gray-300 rounded-lg focus:border-red-500 focus:ring-1 focus:ring-red-500">
                            <span class="text-gray-500 ml-2">台</span>
                        </div>
                    </div>
                    
                    <!-- 产品图片展示 -->
                    <div class="lg:col-span-2" id="productImageSection" style="display: none;">
                        <label class="block text-sm font-medium text-gray-600 mb-2">产品图片：</label>
                        <div id="productImageContainer">
                            <img id="productImage" src="" alt="产品图片">
                        </div>
                        <p id="productImageTitle" class="text-center text-sm text-gray-500 mt-2 font-medium"></p>
                    </div>
                </div>
            </div>

            <!-- 技术参数配置表 -->
            <div class="mb-6">
                <h3 class="font-bold text-gray-700 mb-3"><i class="fas fa-list-alt mr-2"></i>技术参数配置</h3>
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse border border-gray-300">
                        <thead>
                            <tr class="bg-red-600 text-white">
                                <th class="border border-gray-300 px-4 py-3 text-left">配置项目</th>
                                <th class="border border-gray-300 px-4 py-3 text-left">参数说明</th>
                            </tr>
                        </thead>
                        <tbody id="configTable">
                            <tr>
                                <td class="border border-gray-300 px-4 py-2" colspan="2" class="text-center text-gray-500">请先选择产品型号</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 可选配置 -->
            <div class="mb-6">
                <h3 class="font-bold text-gray-700 mb-3"><i class="fas fa-plus-circle mr-2"></i>可选配置</h3>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4" id="optionalConfigs">
                    <!-- 冲口机 -->
                    <div class="optional-item-card relative bg-gray-50 rounded-lg p-3 cursor-pointer hover:bg-gray-100 transition group">
                        <label class="flex flex-col items-center space-y-2">
                            <div class="optional-image-container w-full bg-gray-200 rounded overflow-hidden relative">
                                <img src="./images/选配-冲口机/冲口机.jpg" 
                                     alt="冲口机" 
                                     class="w-full group-hover:scale-110 transition duration-300">
                                <div class="optional-image-preview">
                                    <img src="./images/选配-冲口机/冲口机.jpg" 
                                         alt="冲口机预览">
                                    <p>冲口机</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2 w-full">
                                <input type="checkbox" class="optional-item rounded text-red-600" data-price="4000" onchange="calculateTotal()">
                                <span class="text-sm font-medium">冲口机</span>
                            </div>
                            <span class="text-xs text-red-600 font-bold">¥4,000</span>
                        </label>
                    </div>
                    
                    <!-- 分切机 -->
                    <div class="optional-item-card relative bg-gray-50 rounded-lg p-3 cursor-pointer hover:bg-gray-100 transition group">
                        <label class="flex flex-col items-center space-y-2">
                            <div class="optional-image-container w-full bg-gray-200 rounded overflow-hidden relative">
                                <img src="./images/选配-分切机/LFQ立式自动分条机.jpg" 
                                     alt="分切机" 
                                     class="w-full group-hover:scale-110 transition duration-300">
                                <div class="optional-image-preview">
                                    <img src="./images/选配-分切机/LFQ立式自动分条机.jpg" 
                                         alt="分切机预览">
                                    <p>分切机</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2 w-full">
                                <input type="checkbox" class="optional-item rounded text-red-600" data-price="7000" onchange="calculateTotal()">
                                <span class="text-sm font-medium">分切机</span>
                            </div>
                            <span class="text-xs text-red-600 font-bold">¥7,000</span>
                        </label>
                    </div>
                    
                    <!-- 吸料机 -->
                    <div class="optional-item-card relative bg-gray-50 rounded-lg p-3 cursor-pointer hover:bg-gray-100 transition group">
                        <label class="flex flex-col items-center space-y-2">
                            <div class="optional-image-container w-full bg-gray-200 rounded overflow-hidden relative">
                                <img src="./images/选配-吸料机/自动吸料机.jpg" 
                                     alt="自动吸料机" 
                                     class="w-full group-hover:scale-110 transition duration-300">
                                <div class="optional-image-preview">
                                    <img src="./images/选配-吸料机/自动吸料机.jpg" 
                                         alt="自动吸料机预览">
                                    <p>自动吸料机</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2 w-full">
                                <input type="checkbox" class="optional-item rounded text-red-600" data-price="5000" onchange="calculateTotal()">
                                <span class="text-sm font-medium">自动吸料机</span>
                            </div>
                            <span class="text-xs text-red-600 font-bold">¥5,000</span>
                        </label>
                    </div>
                    
                    <!-- 折边机 -->
                    <div class="optional-item-card relative bg-gray-50 rounded-lg p-3 cursor-pointer hover:bg-gray-100 transition group">
                        <label class="flex flex-col items-center space-y-2">
                            <div class="optional-image-container w-full bg-gray-200 rounded overflow-hidden relative">
                                <img src="./images/选配-折边机/折边收卷机.jpg" 
                                     alt="折边机" 
                                     class="w-full group-hover:scale-110 transition duration-300">
                                <div class="optional-image-preview">
                                    <img src="./images/选配-折边机/折边收卷机.jpg" 
                                         alt="折边机预览">
                                    <p>折边机</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2 w-full">
                                <input type="checkbox" class="optional-item rounded text-red-600" data-price="6000" onchange="calculateTotal()">
                                <span class="text-sm font-medium">折边机</span>
                            </div>
                            <span class="text-xs text-red-600 font-bold">¥6,000</span>
                        </label>
                    </div>
                    
                    <!-- 造粒机 -->
                    <div class="optional-item-card relative bg-gray-50 rounded-lg p-3 cursor-pointer hover:bg-gray-100 transition group">
                        <label class="flex flex-col items-center space-y-2">
                            <div class="optional-image-container w-full bg-gray-200 rounded overflow-hidden relative">
                                <img src="./images/选配-造粒机/风冷造粒机.jpg" 
                                     alt="造粒机" 
                                     class="w-full group-hover:scale-110 transition duration-300">
                                <div class="optional-image-preview">
                                    <img src="./images/选配-造粒机/风冷造粒机.jpg" 
                                         alt="造粒机预览">
                                    <p>造粒机</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2 w-full">
                                <input type="checkbox" class="optional-item rounded text-red-600" data-price="12000" onchange="calculateTotal()">
                                <span class="text-sm font-medium">造粒机</span>
                            </div>
                            <span class="text-xs text-red-600 font-bold">¥12,000</span>
                        </label>
                    </div>
                    
                    <!-- 静止画面 -->
                    <div class="optional-item-card relative bg-gray-50 rounded-lg p-3 cursor-pointer hover:bg-gray-100 transition group">
                        <label class="flex flex-col items-center space-y-2">
                            <div class="optional-image-container w-full bg-gray-200 rounded overflow-hidden relative">
                                <img src="./images/选配-静止画面/静止画面.png" 
                                     alt="静止画面" 
                                     class="w-full group-hover:scale-110 transition duration-300">
                                <div class="optional-image-preview">
                                    <img src="./images/选配-静止画面/静止画面.png" 
                                         alt="静止画面预览">
                                    <p>静止画面</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2 w-full">
                                <input type="checkbox" class="optional-item rounded text-red-600" data-price="3000" onchange="calculateTotal()">
                                <span class="text-sm font-medium">静止画面</span>
                            </div>
                            <span class="text-xs text-red-600 font-bold">¥3,000</span>
                        </label>
                    </div>
                    
                    <!-- 快换网装置 -->
                    <div class="optional-item-card relative bg-gray-50 rounded-lg p-3 cursor-pointer hover:bg-gray-100 transition group">
                        <label class="flex flex-col items-center space-y-2">
                            <div class="optional-image-container w-full bg-gray-200 rounded overflow-hidden relative">
                                <img src="./images/配件-模头带液压换网/单机大吹膜机旋转模头（带液压换网）.jpg" 
                                     alt="快换网装置" 
                                     class="w-full group-hover:scale-110 transition duration-300">
                                <div class="optional-image-preview">
                                    <img src="./images/配件-模头带液压换网/单机大吹膜机旋转模头（带液压换网）.jpg" 
                                         alt="快换网装置预览">
                                    <p>快换网装置</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2 w-full">
                                <input type="checkbox" class="optional-item rounded text-red-600" data-price="6000" onchange="calculateTotal()">
                                <span class="text-sm font-medium">快换网装置</span>
                            </div>
                            <span class="text-xs text-red-600 font-bold">¥6,000</span>
                        </label>
                    </div>
                    
                    <!-- 气涨轴 -->
                    <div class="optional-item-card relative bg-gray-50 rounded-lg p-3 cursor-pointer hover:bg-gray-100 transition group">
                        <label class="flex flex-col items-center space-y-2">
                            <div class="optional-image-container w-full bg-gray-200 rounded overflow-hidden relative">
                                <img src="./images/气涨轴/da5425c9-6c5b-4aac-9e9a-50019af92bf6.png" 
                                     alt="气涨轴" 
                                     class="w-full group-hover:scale-110 transition duration-300">
                                <div class="optional-image-preview">
                                    <img src="./images/气涨轴/da5425c9-6c5b-4aac-9e9a-50019af92bf6.png" 
                                         alt="气涨轴预览">
                                    <p>气涨轴</p>
                                </div>
                            </div>

    <script>
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 同步网络时间
            syncNetworkTime();
            
            // 系列选择变化时重置显示/隐藏图片区域
            document.getElementById('productSeries').addEventListener('change', function() {
                const productImageSection = document.getElementById('productImageSection');
                if (this.value) {
                    productImageSection.style.display = 'block';
                } else {
                        productImageSection.style.display = 'none';
                    }
                });
        });

        // 同步网络时间
        function syncNetworkTime() {
            const statusElement = document.getElementById('timeSyncStatus');
            statusElement.textContent = '正在同步时间...';
            
            // 使用网络时间API
            fetch('https://worldtimeapi.org/api/ip')
                .then(response => response.json())
                .then(data => {
                    const now = new Date(data.datetime);
                    updateQuoteDate(now);
                    statusElement.textContent = '时间同步成功';
                    setTimeout(() => {
                        statusElement.textContent = '';
                    }, 2000);
                })
                .catch(error => {
                    console.error('时间同步失败:', error);
                    // 使用本地时间作为 fallback
                    updateQuoteDate(new Date());
                    statusElement.textContent = '使用本地时间';
                    setTimeout(() => {
                        statusElement.textContent = '';
                    }, 2000);
                });
        }

        // 更新报价日期
        function updateQuoteDate(date) {
            const displayElement = document.getElementById('quoteDateDisplay');
            const inputElement = document.getElementById('quoteDateInput');
            
            let currentDate;
            if (date) {
                currentDate = date;
            } else {
                currentDate = new Date(inputElement.value) || new Date();
            }
            
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            const day = String(currentDate.getDate()).padStart(2, '0');
            
            const dateString = `${year}-${month}-${day}`;
            displayElement.textContent = dateString;
            inputElement.value = dateString;
        }

        // 根据型号名匹配本地图片 - 尝试加载不同扩展名的图片
        function getLocalImageForModel(modelName) {
            const extensions = ['.png', '.jpg', '.jpeg', '.gif'];
            
            // 处理特殊字符：Windows文件系统不支持 × 和 / 等字符
            // 尝试多种可能的文件夹名称变体
            let folderNames = [modelName];
            
            // 替换 × 为 x 或 2
            if (modelName.includes('×')) {
                folderNames.push(modelName.replace(/×/g, 'x'));
                folderNames.push(modelName.replace(/×/g, '2'));
            }
            
            // 替换 / 为 -
            if (modelName.includes('/')) {
                folderNames.push(modelName.replace(/\//g, '-'));
            }
            
            const possibleImages = [];
            folderNames.forEach(folderName => {
                extensions.forEach(ext => {
                    possibleImages.push(`./images/${folderName}/${folderName}${ext}`);
                });
            });
            
            return possibleImages;
        }
        
        // 动态加载图片，尝试所有可能的路径
        function loadProductImage(modelName, onSuccess, onError) {
            const possibleImages = getLocalImageForModel(modelName);
            let currentIndex = 0;
            
            function tryNext() {
                if (currentIndex >= possibleImages.length) {
                    if (onError) onError();
                    return;
                }
                
                const img = new Image();
                img.onload = function() {
                    if (onSuccess) onSuccess(possibleImages[currentIndex]);
                };
                img.onerror = function() {
                    currentIndex++;
                    tryNext();
                };
                img.src = possibleImages[currentIndex];
            }
            
            tryNext();
        }

        // 根据系列名匹配图片 - 使用第一个型号的图片
        function getImageForSeries(seriesKey, models, callback) {
            const firstModel = Object.keys(models)[0];
            if (firstModel) {
                loadProductImage(firstModel, 
                    function(successImage) {
                        if (callback) callback({
                            name: firstModel,
                            image: successImage
                        });
                    },
                    function() {
                        // 尝试使用产品默认图片
                        const product = models[firstModel];
                        if (product && product.image) {
                            if (callback) callback({
                                name: firstModel,
                                image: product.image
                            });
                        } else {
                            // 使用默认图片
                            if (callback) callback({
                                name: firstModel,
                                image: './images/MONO-45/MONO.png'
                            });
                        }
                    }
                );
            } else {
                if (callback) callback({
                    name: '吹膜机系列',
                    image: './images/MONO-45/MONO.png'
                });
            }
        }

        // 更新产品型号选项
        function updateModels() {
            const seriesSelect = document.getElementById('productSeries');
            const modelSelect = document.getElementById('productModel');
            const selectedSeries = seriesSelect.value;
            
            // 清空现有选项
            modelSelect.innerHTML = '<option value="">请选择具体型号</option>';
            
            if (selectedSeries) {
                const models = productDB[selectedSeries];
                if (models) {
                    Object.keys(models).forEach(model => {
                        const option = document.createElement('option');
                        option.value = model;
                        option.textContent = model;
                        modelSelect.appendChild(option);
                    });
                    
                    // 根据系列名匹配图片（异步加载）
                    getImageForSeries(selectedSeries, models, function(seriesImageInfo) {
                        if (seriesImageInfo) {
                            updateProductImage(seriesImageInfo.name, seriesImageInfo.image);
                        }
                    });
                }
            } else {
                modelSelect.innerHTML = '<option value="">请先选择产品系列</option>';
            }
            
            // 重置产品配置和价格
            resetProductConfig();
        }

        // 重置产品配置
        function resetProductConfig() {
            const configTable = document.getElementById('configTable');
            const productImageSection = document.getElementById('productImageSection');
            const productImage = document.getElementById('productImage');
            const productImageTitle = document.getElementById('productImageTitle');
            const unitPrice = document.getElementById('unitPrice');
            const totalPrice = document.getElementById('totalPrice');
            const optionalPrice = document.getElementById('optionalPrice');
            
            configTable.innerHTML = '<tr><td class="border border-gray-300 px-4 py-2" colspan="2" class="text-center text-gray-500">请先选择产品型号</td></tr>';
            // 保留图片区域（已在updateModels中显示系列图片）
            productImageTitle.textContent = '';
            unitPrice.textContent = '¥0.00';
            totalPrice.textContent = '¥0.00';
            optionalPrice.textContent = '¥0.00';
        }

        // 更新产品配置
        function updateProductConfig() {
            const seriesSelect = document.getElementById('productSeries');
            const modelSelect = document.getElementById('productModel');
            const selectedSeries = seriesSelect.value;
            const selectedModel = modelSelect.value;
            
            if (selectedSeries && selectedModel) {
                const product = productDB[selectedSeries][selectedModel];
                if (product) {
                    // 更新配置表格
                    updateConfigTable(product.config);
                    
                    // 获取系列名用于显示
                    let displayName = selectedModel;
                    const seriesConfig = product.config.find(item => item.item === '系列');
                    if (seriesConfig) {
                        const seriesValue = seriesConfig.value;
                        // ABA-900、ABA-1100、ABA-1300 属于 ABA CO-EX AUTO 系列
                        if (seriesValue === 'ABA CO-EX AUTO 吹膜机' || 
                            (selectedModel.startsWith('ABA-') && !selectedModel.startsWith('ABC-'))) {
                            displayName = selectedModel + ' (ABA CO-EX AUTO)';
                        }
                        // ABC-1400、ABC-1700、ABC-2200 属于 ABC-IBC 三层共挤吹膜机
                        else if (seriesValue === 'ABC-IBC 三层共挤吹膜机' || 
                            (selectedModel.startsWith('ABC-14') || selectedModel.startsWith('ABC-17') || selectedModel.startsWith('ABC-22'))) {
                            displayName = selectedModel + ' (ABC-IBC 三层共挤)';
                        }
                        // MINI-45-PRO 属于 迷你型高速吹膜机
                        else if (seriesValue === '迷你型高速吹膜机' || 
                            selectedModel === 'MINI-45-PRO') {
                            displayName = selectedModel + ' (迷你型高速)';
                        }
                        // MONO DOUBLE HEAD 系列
                        else if (seriesValue === 'MONO DOUBLE HEAD 单螺杆双模头吹膜机' || 
                            selectedModel === 'SJ-60' || selectedModel === 'SJ-70') {
                            displayName = selectedModel + ' (MONO DOUBLE HEAD)';
                        }
                        // MONO-LINE PRINTING 系列
                        else if (seriesValue === 'MONO-LINE PRINTING(GRAVURE) 塑料吹膜凹版印刷机组系列' || 
                            selectedModel.startsWith('SJ-P')) {
                            displayName = selectedModel + ' (MONO-LINE PRINTING)';
                        } else {
                            displayName = selectedModel + ' (' + seriesValue + ')';
                        }
                    }
                    
                    // 使用动态加载函数尝试匹配本地图片
                    loadProductImage(selectedModel, 
                        function(successImage) {
                            updateProductImage(displayName, successImage);
                        },
                        function() {
                            // 所有路径都失败时，使用产品默认图片或隐藏图片区域
                            updateProductImage(displayName, product.image || '');
                        }
                    );
                    // 更新价格
                    updatePrice(product.basePrice);
                }
            }
        }

        // 更新配置表格
        function updateConfigTable(config) {
            const configTable = document.getElementById('configTable');
            configTable.innerHTML = '';
            
            config.forEach(item => {
                const row = document.createElement('tr');
                const itemCell = document.createElement('td');
                const valueCell = document.createElement('td');
                
                itemCell.className = 'border border-gray-300 px-4 py-2 font-medium';
                valueCell.className = 'border border-gray-300 px-4 py-2';
                
                itemCell.textContent = item.item;
                valueCell.textContent = item.value;
                
                row.appendChild(itemCell);
                row.appendChild(valueCell);
                configTable.appendChild(row);
            });
        }

        // 更新产品图片
        function updateProductImage(model, imageUrl) {
            const productImageSection = document.getElementById('productImageSection');
            const productImage = document.getElementById('productImage');
            const productImageTitle = document.getElementById('productImageTitle');
            
            if (imageUrl) {
                productImage.src = imageUrl;
                productImageSection.style.display = 'block';
            } else {
                productImageSection.style.display = 'none';
            }
            
            productImageTitle.textContent = model;
        }

        // 更新价格
        function updatePrice(basePrice) {
            const unitPrice = document.getElementById('unitPrice');
            unitPrice.textContent = `¥${basePrice.toLocaleString()}`;
            calculateTotal();
        }

        // 计算总价
        function calculateTotal() {
            const seriesSelect = document.getElementById('productSeries');
            const modelSelect = document.getElementById('productModel');
            const quantityInput = document.getElementById('quantity');
            const unitPriceElement = document.getElementById('unitPrice');
            const optionalPriceElement = document.getElementById('optionalPrice');
            const totalPriceElement = document.getElementById('totalPrice');
            const quantityDisplay = document.getElementById('quantityDisplay');
            
            const selectedSeries = seriesSelect.value;
            const selectedModel = modelSelect.value;
            const quantity = parseInt(quantityInput.value) || 1;
            
            quantityDisplay.textContent = quantity;
            
            let basePrice = 0;
            if (selectedSeries && selectedModel) {
                basePrice = productDB[selectedSeries][selectedModel].basePrice || 0;
            }
            
            // 计算可选配置价格
            let optionalPrice = 0;
            document.querySelectorAll('.optional-item:checked').forEach(item => {
                optionalPrice += parseInt(item.dataset.price) || 0;
            });
            
            // 计算总价
            const totalPrice = (basePrice * quantity) + optionalPrice;
            
            // 更新价格显示
            unitPriceElement.textContent = `¥${basePrice.toLocaleString()}`;
            optionalPriceElement.textContent = `¥${optionalPrice.toLocaleString()}`;
            totalPriceElement.textContent = `¥${totalPrice.toLocaleString()}`;
        }

                ['ZHEJIANG ZHUXIN MACHINERY CO., LTD.', '', '', 'QUOTATION'],

                ['客户信息', '', '', ''],

                ['产品系列:', seriesSelect.options[seriesSelect.selectedIndex].text, '', ''],
                ['产品型号:', selectedModel, '', ''],
                ['数量:', quantity, '台', ''],
                ['', '', '', ''],
                ['技术参数配置', '', '', ''],
                ['配置项目', '参数说明', '', ''],

            product.config.forEach(item => {
                data.push([item.item, item.value, '', '']);
            });

            document.querySelectorAll('.optional-item:checked').forEach(item => {
                const label = item.parentElement.querySelector('span').textContent;
                const price = item.dataset.price;

            if (optionalItems.length > 0) {

                data.push(['可选配置', '', '', '']);
                optionalItems.forEach(item => {

                });

            // 添加价格汇总

            // 添加公司信息
            data.push(['', '', '', '']);
            data.push(['公司信息', '', '', '']);
            data.push(['销售热线:', '18257797135', '', '']);
            data.push(['电子邮箱:', '64648498@sina.com', '', '']);
            data.push(['公司地址:', '浙江省温州市平阳县粮油东路', '', '']);
            
            // 创建工作簿
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);

                { wch: 20 },
                { wch: 30 },
                { wch: 10 },
                { wch: 20 }
            ];

            const isMobile = isIOS || isAndroid;
            
            if (isMobile) {
                // 移动设备：使用blob和URL.createObjectURL
                const excelBlob = XLSX.write(wb, { bookType: 'xlsx', type: 'blob' });
                const blobUrl = URL.createObjectURL(excelBlob);
                
                if (isIOS) {
                    // iOS设备：使用iframe打开
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = blobUrl;
                    document.body.appendChild(iframe);
                    
                    // 提示用户手动保存
                    setTimeout(() => {
                        alert('Excel表格已生成！请点击分享按钮，然后选择"保存到文件"或其他应用');
                    }, 500);
                    
                    // 清理资源（延迟清理，确保用户有时间看到Excel）

                        document.body.removeChild(iframe);
                        URL.revokeObjectURL(blobUrl);
                    }, 60000); // 1分钟后清理

                    // Android设备：直接打开Excel
                    window.open(blobUrl, '_blank');
                    
                    // 提示用户保存
                    setTimeout(() => {
                        alert('Excel表格已在新标签页打开！请点击菜单按钮，然后选择"下载"或"保存"');
                    }, 500);
                    
                    // 清理资源
                    setTimeout(() => {
                        URL.revokeObjectURL(blobUrl);
                    }, 60000); // 1分钟后清理
                }
            } else {
                // 桌面设备：直接保存
                XLSX.writeFile(wb, fileName);
                
                // 显示成功提示
                setTimeout(() => {
                    alert('Excel表格保存成功！');
                }, 100);
            }
        }

        // 保存为PDF（使用jsPDF和html2canvas直接生成）
        function saveAsPDF() {
            const seriesSelect = document.getElementById('productSeries');
            const modelSelect = document.getElementById('productModel');
            const selectedSeries = seriesSelect.value;
            const selectedModel = modelSelect.value;
            
            if (!selectedSeries || !selectedModel) {
                alert('请先选择产品型号');
                return;
            }
            
            const quoteDate = document.getElementById('quoteDateDisplay').textContent;
            
            try {
                // 检查必要的库是否加载
                if (typeof html2canvas === 'undefined' || typeof jsPDF === 'undefined') {
                    throw new Error('PDF生成库未加载');
                }
                
                // 显示提示
                alert('正在生成PDF，请稍候...');
                
                // 获取打印区域
                const printArea = document.querySelector('.print-area');
                
                // 使用html2canvas将打印区域转换为图片
                html2canvas(printArea, {
                    scale: 2,
                    useCORS: true,
                    logging: false,
                    allowTaint: false,
                    backgroundColor: '#ffffff'
                }).then(canvas => {
                    try {
                        // 获取图片数据
                        const imgData = canvas.toDataURL('image/png');
                        
                        // 计算PDF尺寸（A4纸大小）
                        const imgWidth = 210; // A4宽度（mm）
                        const pageHeight = 297; // A4高度（mm）
                        const imgHeight = (canvas.height * imgWidth) / canvas.width;
                        
                        // 创建PDF文档
                        const pdf = new jsPDF('p', 'mm', 'a4');
                        
                        // 添加图片到PDF
                        pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                        
                        // 生成文件名
                        const fileName = `铸信机械报价单_${selectedModel}_${quoteDate}.pdf`;
                        
                        // 检测设备类型
                        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
                        const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
                        const isAndroid = /android/i.test(userAgent);
                        const isMobile = isIOS || isAndroid;
                        
                        if (isMobile) {
                            // 移动设备：使用blob和URL.createObjectURL
                            const pdfBlob = pdf.output('blob');
                            const blobUrl = URL.createObjectURL(pdfBlob);
                            
                            if (isIOS) {
                                // iOS设备：使用iframe打开
                                const iframe = document.createElement('iframe');
                                iframe.style.display = 'none';
                                iframe.src = blobUrl;
                                document.body.appendChild(iframe);
                                
                                // 提示用户手动保存
                                setTimeout(() => {
                                    alert('PDF已生成！请点击分享按钮，然后选择"保存到文件"或其他应用');
                                }, 500);
                                
                                // 清理资源（延迟清理，确保用户有时间看到PDF）
                                setTimeout(() => {
                                    document.body.removeChild(iframe);
                                    URL.revokeObjectURL(blobUrl);
                                }, 60000); // 1分钟后清理
                            } else if (isAndroid) {
                                // Android设备：直接打开PDF
                                window.open(blobUrl, '_blank');
                                
                                // 提示用户保存
                                setTimeout(() => {
                                    alert('PDF已在新标签页打开！请点击菜单按钮，然后选择"下载"或"保存"');
                                }, 500);
                                
                                // 清理资源
                                setTimeout(() => {
                                    URL.revokeObjectURL(blobUrl);
                                }, 60000); // 1分钟后清理
                            }
                        } else {
                            // 桌面设备：直接保存
                            pdf.save(fileName);
                            
                            // 显示成功提示
                            setTimeout(() => {
                                alert('PDF保存成功！');
                            }, 100);
                        }
                    } catch (pdfError) {
                        console.error('PDF生成失败:', pdfError);
                        alert('PDF生成失败: ' + pdfError.message);
                    }
                }).catch(error => {
                    console.error('页面转换失败:', error);
                    alert('页面转换失败: ' + error.message);
                });
            } catch (error) {
                console.error('PDF导出初始化失败:', error);
                alert('PDF导出初始化失败: ' + error.message);
            }
        }

        // 保存为图片
        function exportToImage() {
            const seriesSelect = document.getElementById('productSeries');
            const modelSelect = document.getElementById('productModel');
            const selectedSeries = seriesSelect.value;
            const selectedModel = modelSelect.value;
            
            if (!selectedSeries || !selectedModel) {
                alert('请先选择产品型号');
                return;
            }
            
            const quoteDate = document.getElementById('quoteDateDisplay').textContent;
            
            try {
                // 检查必要的库是否加载
                if (typeof html2canvas === 'undefined') {
                    throw new Error('html2canvas库未加载');
                }
                
                // 显示提示
                alert('正在生成图片，请稍候...');
                
                // 使用html2canvas将整个页面转换为图片
                html2canvas(document.body, {
                    scale: 2,
                    useCORS: true,
                    logging: false,
                    allowTaint: false,
                    backgroundColor: '#ffffff'
                }).then(canvas => {
                    try {
                        // 生成图片URL
                        const imgData = canvas.toDataURL('image/png');
                        
                        // 创建下载链接
                        const link = document.createElement('a');
                        link.href = imgData;
                        link.download = `铸信机械报价单_${selectedModel}_${quoteDate}.png`;
                        link.style.display = 'none';
                        document.body.appendChild(link);
                        
                        // 触发下载
                        link.click();
                        
                        // 清理
                        setTimeout(() => {
                            document.body.removeChild(link);
                            // 显示成功提示
                            alert('图片保存成功！');
                        }, 100);
                    } catch (imgError) {
                        console.error('图片生成失败:', imgError);
                        alert('图片生成失败: ' + imgError.message);
                    }
                }).catch(error => {
                    console.error('页面转换失败:', error);
                    alert('页面转换失败: ' + error.message);
                });
            } catch (error) {
                console.error('图片导出初始化失败:', error);
                alert('图片导出初始化失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
